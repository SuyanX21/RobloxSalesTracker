<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Sales Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="rbx-sales-tracker-minimal" style="position: fixed; top: 100px; right: 50px; width: 320px; background: #1b1d1f; border-radius: 6px; color: #ffffff; padding: 20px; z-index: 100000; font-family: sans-serif; box-shadow: 0 4px 15px rgba(0,0,0,0.6);">
        <a href="help.html" target="_blank" title="What is this?" style="position: absolute; top: 12px; right: 12px; text-decoration: none; color: #aaa; font-size: 20px; background: #252729; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 6px rgba(0,0,0,0.2); cursor: pointer; transition: background 0.2s;">
            <span style="font-weight: bold;">?</span>
        </a>
        <a href="#" id="settings-link" title="Settings" style="position: absolute; top: 12px; right: 48px; text-decoration: none; color: #aaa; font-size: 20px; background: #252729; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 6px rgba(0,0,0,0.2); cursor: pointer; transition: background 0.2s;">
            <span style="font-weight: bold;">&#9881;</span>
        </a>
        <div style="font-size: 22px; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 8px;">Roblox Sales Tracker</div>
        <div style="margin-bottom: 20px; background: #252729; padding: 10px; border-radius: 4px;">
            <div style="font-size: 14px; color: #aaa; text-transform: uppercase;">Heute (<span id="today-label">Loading...</span>)</div>
            <div style="font-size: 20px; margin-top: 5px;">Sales: <b id="today-count">0</b></div>
            <div style="font-size: 20px; color: #00b06f;"><b id="today-robux">R$ 0</b> <span id="today-conversion" style="font-size:12px; color:#aaa; margin-left:6px;"></span></div>
        </div>
        <div style="margin-bottom: 25px;">
            <div style="font-size: 14px; color: #aaa; text-transform: uppercase;">Past 7 Days</div>
            <div style="font-size: 18px; margin-top: 5px;">Total Sales: <b id="days7-count">0</b></div>
            <div style="font-size: 18px;">Estimated: <span style="color: #ffb800;" id="days7-robux">R$ 0</span> <span id="days7-conversion" style="font-size:12px; color:#aaa; margin-left:6px;"></span></div>
        </div>
         <div style="margin-top: 25px;">
            <div style="font-size: 14px; color: #aaa; text-transform: uppercase;">All Time</div>
            <div style="font-size: 12px; color: #888; margin-bottom: 8px;">Oldest logged: <span style="color: #ffb800;" id="alltime-start">Loading...</span></div>
            <div style="font-size: 18px; margin-top: 5px;">Total Sales: <b id="alltime-count">0</b></div>
            <div style="font-size: 18px;">Estimated: <span style="color: #ffb800;" id="alltime-robux">R$ 0</span> <span id="alltime-conversion" style="font-size:12px; color:#aaa; margin-left:6px;"></span></div>
        </div>
        
        <div style="margin-top: 25px; background: #252729; padding: 12px; border-radius: 6px;">
            <div style="font-size: 11px; color: #aaa; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px;">Pending Revenue (P-R-P)</div>
            <div style="font-size: 14px; margin-top: 12px; color: #ffffff;">Next 24h: <b id="pending24h-robux" style="color: #ff6b6b;">R$ 0</b> <span id="pending24h-conversion" style="font-size:11px; color:#aaa; margin-left:6px;"></span></div>
            <div style="font-size: 14px; margin-top: 8px; color: #ffffff;">Next 72h: <b id="pending72h-robux" style="color: #ffa726;">R$ 0</b> <span id="pending72h-conversion" style="font-size:11px; color:#aaa; margin-left:6px;"></span></div>
            <div style="font-size: 14px; margin-top: 8px; color: #ffffff;">Total Pending: <b id="totalpending-robux" style="color: #64b5f6;">R$ 0</b> <span id="totalpending-conversion" style="font-size:11px; color:#aaa; margin-left:6px;"></span></div>
        </div>

        <div style="display: flex; gap: 8px; margin-top: 20px; margin-bottom: 15px;">
            <button id="scan-new-btn" style="flex: 1; padding: 10px; background: #34373a; border: none; border-radius: 6px; color: #fff; font-weight: bold; font-size: 13px; cursor: pointer; transition: background 0.2s;" onmouseover="this.style.background='#404346'" onmouseout="this.style.background='#34373a'">Scan New</button>
            <button id="scan-full-btn" style="flex: 1; padding: 10px; background: #34373a; border: none; border-radius: 6px; color: #fff; font-weight: bold; font-size: 13px; cursor: pointer; transition: background 0.2s;" onmouseover="this.style.background='#404346'" onmouseout="this.style.background='#34373a'">Full Scan</button>
        </div>
        <button id="open-analytics-btn" style="width: 100%; padding: 12px; background: #00b06f; border: none; border-radius: 6px; color: #fff; font-weight: bold; font-size: 15px; cursor: pointer; margin-bottom: 10px;">Open Analytics Dashboard</button>
        <div id="reset-tracker" style="color: #ffffff; font-size: 18px; cursor: pointer; display: block; text-align: center; opacity: 0.8; margin-top: 10px;">reset</div>
    </div>
    <script src="content.js"></script>
</body>
</html>
